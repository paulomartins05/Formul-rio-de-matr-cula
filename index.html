<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de matrícula</title>
  <link rel="stylesheet" href="style/index.css">
</head>
<body>
  <div id="app">
    <main>
      <div class="main-container">
        <div class="back">
          <img src="assets/icons/arrow-left-02.svg" alt="seta apontando para esquerda para voltar">
          <span>Voltar</span>
        </div>

        <h1>Formulário de matrícula</h1>
        <p>Preencha os dados abaixo para matricular seu filho na escola de educação infantil Estrelas do Amanhã.</p>

      </div>
    </main>

    <aside>
      <div class="aside-container">
        <header>
          <img src="assets/image/logo.svg" alt="imagem da logo, escrito 'Estrelas do Amanhã'">
          <h2>
            Porque cada momento de <span>aprendizado</span> conta
          </h2>
          <p>
            Inscreva seu filho em nossa escola e veja-o florescer em um ambiente acolhedor, seguro e estimulante.
          </p>
        </header>
        <img src="assets/image/ilustracoes.svg" alt="ilustração da professora e as crianças">

      </div>
    </aside>

  </div>
  
</body>
</html>
